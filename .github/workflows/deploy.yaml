name: AI Service CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/tsu-taskgraph-ai
  DEPLOY_USERNAME: 'deployuser'
  SERVICE_NAME: 'taskgraph-ai'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.run_number }}

      - name: 📁 Copy compose prod file to server
        if: github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "compose.prod.yaml"
          target: "/home/${{ env.DEPLOY_USERNAME }}/tsu-taskgraph-ai/"

      - name: 🚀 Deploy to Server (SSH)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/${{ env.DEPLOY_USERNAME }}/tsu-taskgraph-ai/

            echo "🔐 Generating .env file from secrets..."
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}" >> .env
            echo "REDIS_URL=redis://redis:6379/0" >> .env
            echo "APP_CORS_ALLOWED_ORIGINS=${{ secrets.APP_CORS_ALLOWED_ORIGINS }}" >> .env
            echo "DEBUG=${{ secrets.DEBUG }}" >> .env
            echo "ROOT_PATH=${{ secrets.ROOT_PATH }}" >> .env

            echo "📥 Pulling latest images..."
            docker compose -f compose.prod.yaml pull ai-service

            echo "🚀 Starting containers..."
            docker compose -f compose.prod.yaml up -d

            echo "🧹 Cleaning up old images..."
            docker image prune -f

      - name: 🛠 Rollback
        if: failure() && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ env.DEPLOY_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "⚠️ Deployment error. Ensuring current infrastructure is up..."
            cd /home/${{ env.DEPLOY_USERNAME }}/tsu-taskgraph-ai/
            docker compose -f compose.prod.yaml up -d
